<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Process Automation – Lecture 2</title>

  <style>
    :root { --bg:#0b1220; --card:#111a2e; --text:#e7eefc; --muted:#a8b3cf; --accent:#4da3ff; --good:#3ddc97; --bad:#ff5c7a; }
    *{ box-sizing:border-box; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body{ margin:0; background:linear-gradient(160deg,#081022,#0b1220); color:var(--text); }
    header{ position:sticky; top:0; backdrop-filter: blur(10px); background:rgba(11,18,32,.7); border-bottom:1px solid rgba(255,255,255,.08); z-index:10; }
    .wrap{ max-width:1000px; margin:0 auto; padding:18px 18px; }
    .row{ display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .title{ font-weight:700; letter-spacing:.2px; }
    .sub{ color:var(--muted); font-size:14px; }
    .bar{ height:10px; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; }
    .bar > div{ height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#7cc6ff); transition:width .25s ease; }
    main{ padding:20px 0 60px; }
    .card{ background:rgba(17,26,46,.85); border:1px solid rgba(255,255,255,.08); border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
    .cardPad{ padding:18px; }

    .grid{ display:grid; grid-template-columns: 1fr; gap:14px; }
    @media(min-width: 900px){ .grid{ grid-template-columns: 2fr 1fr; } }

    .h1{ font-size:26px; margin:0 0 10px; }
    .h2{ font-size:18px; margin:18px 0 10px; color:#d8e6ff; }

    ul{ margin:10px 0 0 18px; color:var(--text); }
    li{ margin:6px 0; }

    .pill{ display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(77,163,255,.12); border:1px solid rgba(77,163,255,.35); color:#cfe7ff; font-size:12px; }

    .btns{ display:flex; gap:10px; flex-wrap:wrap; }
    button{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      transition:transform .04s ease, background .15s ease;
    }
    button:hover{ background:rgba(255,255,255,.10); }
    button:active{ transform:translateY(1px); }
    button.primary{ background:rgba(77,163,255,.20); border-color:rgba(77,163,255,.55); }
    button.primary:hover{ background:rgba(77,163,255,.28); }
    button.bad{ background:rgba(255,92,122,.16); border-color:rgba(255,92,122,.45); }

    .note{ color:var(--muted); font-size:14px; line-height:1.6; }
    .kbd{ font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; padding:2px 6px; border-radius:8px; border:1px solid rgba(255,255,255,.15); background:rgba(0,0,0,.18); }

    .footerNav{ position:fixed; bottom:0; left:0; right:0; background:rgba(11,18,32,.75); border-top:1px solid rgba(255,255,255,.08); backdrop-filter: blur(10px); }
    .footerNav .wrap{ display:flex; justify-content:space-between; align-items:center; gap:12px; }

    /* ---- Book-like typography ---- */
    .book{ max-width: 70ch; margin: 0; }
    .book p{ color: var(--text); line-height: 1.85; margin: 10px 0; font-size: 16px; }
    .book p.lead{ color: #d8e6ff; font-size: 16px; }
    .book .small{ color: var(--muted); font-size: 13px; margin-top: 6px; }
    .book hr{ border: none; border-top: 1px solid rgba(255,255,255,.10); margin: 18px 0; }
    .book .dropcap:first-letter{
      float:left; font-size: 42px; line-height: 38px; padding: 6px 8px 0 0;
      color: #d8e6ff; font-weight: 800;
    }

    .quote{
      margin:12px 0;
      padding:12px 14px;
      border-left:4px solid rgba(77,163,255,.75);
      background:rgba(77,163,255,.08);
      border-radius:14px;
      color:#d9ecff;
      white-space: pre-wrap;
    }

    /* Reveal blocks */
    .toggleBtn{
      display:flex; align-items:center; justify-content:space-between;
      width:100%; text-align:left; margin-top:14px; padding:10px 12px;
      border-radius:14px; border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04); cursor:pointer; color:#d8e6ff; font-weight:700;
    }
    .toggleBtn:hover{ background:rgba(255,255,255,.07); }
    .panel{
      margin-top:10px; padding:12px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.03);
    }
    .hidden{ display:none; }

    .kpiGrid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:10px; margin-top:10px; }
    .kpi{ border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.04); border-radius:14px; padding:12px; }
    .kpi strong{ display:block; font-size:13px; color:#d8e6ff; }
    .kpi span{ display:block; margin-top:6px; color:var(--text); }

    .marker{
      display:inline-block; padding:2px 8px; border-radius:999px;
      border:1px solid rgba(77,163,255,.35); background:rgba(77,163,255,.10);
      color:#cfe7ff; font-size:12px; transform: translateY(-1px);
    }

    /* ---- Quiz styles (retry-friendly) ---- */
    .quizBox{
      margin-top:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      border-radius:16px;
      padding:14px;
    }
    .qTitle{ font-weight:800; color:#d8e6ff; margin:0 0 8px; }
    .qPrompt{ margin:0 0 12px; line-height:1.75; color:var(--text); }
    .qOptions{ display:grid; gap:10px; }
    .qOpt{
      text-align:left;
      border-radius:14px;
      padding:12px 12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
    }
    .qOpt:hover{ background:rgba(255,255,255,.08); }
    .qOpt.correct{
      border-color:rgba(61,220,151,.55);
      background:rgba(61,220,151,.12);
    }
    .qOpt.wrong{
      border-color:rgba(255,92,122,.55);
      background:rgba(255,92,122,.12);
    }
    .qFeedback{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      color:var(--text);
      line-height:1.6;
    }
    .qMeta{ margin-top:10px; color:var(--muted); font-size:13px; }
  
    /* ---- Ordering activities (DMAIC, 5S) ---- */
    .orderPool, .orderDrop{
      display:flex; flex-wrap:wrap; gap:10px;
      padding:10px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.18);
      background:rgba(255,255,255,.03);
      min-height:54px;
    }
    
    /* Drag-sort items (Lecture 1 proven implementation) */
    .dragItem{
      user-select:none;
      padding:10px 12px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.20);
      background:rgba(255,255,255,.04);
      margin:8px 0;
      cursor:grab;
      touch-action:none; /* critical for phone Chrome */
    }
    .dragItem.dragging{ opacity:.55; }

    /* Floating clone while dragging */
    .dragGhost{
      position:fixed;
      z-index:99999;
      pointer-events:none;
      box-shadow:0 14px 40px rgba(0,0,0,.45);
      opacity:.95;
      cursor:grabbing;
    }
.orderItem{
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      cursor:grab;
      user-select:none;
      font-weight:700;
      color:var(--text);
    }
  .orderItem.dragging{ opacity:.55; cursor:grabbing; }

    /* Floating clone while dragging (mobile-friendly) */
    .dragGhost{
      position:fixed;
      z-index:99999;
      pointer-events:none;
      box-shadow:0 14px 40px rgba(0,0,0,.45);
      opacity:.95;
      cursor:grabbing;
    }
    .orderItem:active{ cursor:grabbing; }
    .orderDrop .orderItem{
      border-color:rgba(77,163,255,.30);
      background:rgba(77,163,255,.08);
    }
    .orderHintGood{ border-color:rgba(61,220,151,.45) !important; background:rgba(61,220,151,.10) !important; }
    .orderHintBad{ border-color:rgba(255,92,122,.45) !important; background:rgba(255,92,122,.10) !important; }

  </style>
</head>

<script>
/** ---------------------------------------------------------
 *  Process Automation – Interactive Lecture 3
 *  Topic: Process Methodologies (Lean, Six Sigma, Lean Six Sigma)
 *  This version REMOVES all slides BEFORE Lecture 3 and keeps reveal buttons working.
 *  --------------------------------------------------------- */

const lessonData = {
  courseTitle: "Process Automation – Interactive Lecture 3",
  courseSub: "Process Methodologies (Lean • Six Sigma • Lean Six Sigma)",
  learningOutcomes: [
    "Explain the purpose of Lean and name its core principles (Value, Value Stream, Flow, Pull, Perfection/Kaizen).",
    "Explain Six Sigma at a high level (defects, DPMO) and outline DMAIC.",
    "Differentiate Lean vs Six Sigma and describe why Lean Six Sigma combines both.",
    "Apply process-method thinking to RPA: maps, bottlenecks, FMEA thinking, and continuous improvement."
  ],
  slides: [
    {
      type:"content",
      title:"Lecture 3 – Process Methodologies",
      html: `
        <div class="book">
          <p class="lead dropcap">
            RPA is a powerful tool—but it is not a substitute for good processes.
            If we automate a weak workflow, we simply make the weak behavior happen faster.
            This lecture introduces three practical process methodologies that help you improve work <em>before</em> (and after) automation:
            <strong>Lean</strong>, <strong>Six Sigma</strong>, and <strong>Lean Six Sigma</strong>.
          </p>

          <div class="panel">
            <ul>
              <li><strong>Lean</strong>: reduce waste and improve flow (customer value first).</li>
              <li><strong>Six Sigma</strong>: reduce defects using data and disciplined improvement.</li>
              <li><strong>Lean Six Sigma</strong>: combine speed/flow with defect reduction.</li>
            </ul>
          </div>

          <p>
            We begin with a real example: how an organization built a culture of continuous improvement—and why that mattered for RPA.
          </p>
        </div>
      `
    },

    {
      type:"content",
      title:"Case: Voya and continuous improvement",
      html: `
        <div class="book">
          <p class="lead dropcap">
            After its May 2013 IPO, Voya (a financial services firm) treated the moment as a chance to reshape its culture
            and streamline operations. The company had grown through acquisitions, so it contained multiple sub-cultures—
            which made large, consistent change hard.
          </p>

          <button class="toggleBtn" id="toggleVoya" type="button">
            <span>Reveal: What Voya built</span>
            <span id="iconVoya">▸</span>
          </button>
          <div id="panelVoya" class="panel hidden">
            <ul>
              <li>Voya created a <strong>Continuous Improvement Center</strong>.</li>
              <li>The initiative had high visibility: <strong>the CEO led it</strong>.</li>
              <li>Focus areas: <strong>transparency</strong>, <strong>quality results</strong>, <strong>efficiency</strong>.</li>
              <li>Progress was tracked through metrics like engagement, customer scores, and turnover.</li>
              <li>Ultimate aim: <strong>serve the customer better</strong>.</li>
            </ul>
          </div>

          <button class="toggleBtn" id="toggleVoyaOutcomes" type="button">
            <span>Reveal: Outcomes (examples)</span>
            <span id="iconVoyaOutcomes">▸</span>
          </button>
          <div id="panelVoyaOutcomes" class="panel hidden">
            <ul>
              <li>Retirement Recordkeeping Operations reduced <strong>NIGO</strong> applications by <strong>20%</strong>.</li>
              <li><strong>41%</strong> fewer hardship-call escalations to the call center.</li>
              <li><strong>54%</strong> fewer failures in internal quality control checks.</li>
              <li>Innovation example: <strong>myOrangeMoney</strong> (interactive retirement-savings site) with ~<strong>80%</strong> satisfaction in a survey.</li>
            </ul>
          </div>

          <hr>

          <p>
            The key lesson is cultural: technology becomes useful only when people understand <em>why</em> improvement matters and how to measure it.
            This is exactly why Lean and Six Sigma matter for RPA initiatives.
          </p>
        </div>
      `
    },

    {
      type:"content",
      title:"Lean: where it came from (and why it worked)",
      html: `
        <div class="book">
          <p class="lead dropcap">
            In 1913, Henry Ford changed manufacturing with the moving assembly line.
            It enabled fast mass production—but it also produced rigid, monolithic systems.
            In the decades that followed, Toyota rethought the approach: in a smaller market with diverse needs,
            mass production alone was not enough.
          </p>

          <button class="toggleBtn" id="toggleToyota" type="button">
            <span>Reveal: Toyota Production System (TPS) idea</span>
            <span id="iconToyota">▸</span>
          </button>
          <div id="panelToyota" class="panel hidden">
            <p class="note" style="margin-top:0">
              Toyota pursued a “seemingly magic” combination:
            </p>
            <ul>
              <li><strong>Low cost</strong></li>
              <li><strong>High quality</strong></li>
              <li><strong>Mass customization</strong></li>
            </ul>
            <p class="small">A constant driver was continuous improvement (Kaizen).</p>
          </div>

          <p>
            Lean later became a widely used label (popularized in the 1980s). In practice, it is a customer-first way to remove waste and improve flow.
          </p>
        </div>
      `
    },

    {
      type:"content",
      title:"Lean: the 5 core principles (the usable version)",
      html: `
        <div class="book">
          <p class="lead dropcap">
            Lean can sound fuzzy because organizations implement it differently.
            But the core logic is consistent: define value from the customer’s perspective, map the work, remove waste, and pursue continuous improvement.
          </p>

          <button class="toggleBtn" id="toggleLeanPrinciples" type="button">
            <span>Reveal: Lean principles</span>
            <span id="iconLeanPrinciples">▸</span>
          </button>
          <div id="panelLeanPrinciples" class="panel hidden">
            <ul>
              <li><strong>Value:</strong> what the customer will pay for (requires feedback and market awareness).</li>
              <li><strong>Value Stream:</strong> map development → production → distribution and remove waste (some waste may be necessary for safety/regulation).</li>
              <li><strong>Flow:</strong> ensure efficient creation and delivery; optimize steps across the organization, not only one department.</li>
              <li><strong>Pull:</strong> produce when needed (just-in-time), reducing inventory waste.</li>
              <li><strong>Perfection (Kaizen):</strong> constant improvement; empower employees to improve their work.</li>
            </ul>
          </div>

          <hr>

          <p>
            Lean is a mindset shift. Start with one real problem, learn, then scale to more ambitious improvements.
          </p>
        </div>
      `
    },

    {
      type:"content",
      title:"Lean in practice: Danaher and the “DBS” habit",
      html: `
        <div class="book">
          <p class="lead dropcap">
            Danaher is a famous example of a company turning Lean into a repeatable operating system.
            After early acquisition pressure, Toyota experts helped highlight the factory realities: a mess that required process rethinking.
            Danaher turned the learning into the Danaher Business System (DBS).
          </p>

          <button class="toggleBtn" id="toggleDanaher" type="button">
            <span>Reveal: What made DBS “stick”</span>
            <span id="iconDanaher">▸</span>
          </button>
          <div id="panelDanaher" class="panel hidden">
            <ul>
              <li>Regular <strong>Kaizen sessions</strong> and policy deployment reviews.</li>
              <li>Daily mindset: <strong>“How can things be made better?”</strong></li>
              <li>Leadership involvement: executives taught Lean internally.</li>
              <li>Long-term compounding: the methodology became part of how decisions were made.</li>
            </ul>
            <p class="small">Key idea: methods work when they become a habit—not a one-time project.</p>
          </div>

          <hr>

          <p>
            Lean is not “cost cutting.” It is building a system that continuously improves quality, delivery speed, and cost efficiency—without sacrificing innovation.
          </p>
        </div>
      `
    },

    {
      type:"content",
      title:"Six Sigma: why the name matters (defects, DPMO)",
      html: `
        <div class="book">
          <p class="lead dropcap">
            Six Sigma formalized disciplined quality improvement using data.
            The core goal is to reduce defects by understanding causes and improving processes in a repeatable, sustainable way.
            “Six Sigma” refers to a statistical idea: being within six standard deviations from the mean.
          </p>

          <button class="toggleBtn" id="toggleSixSigmaBasics" type="button">
            <span>Reveal: What “Six Sigma” implies</span>
            <span id="iconSixSigmaBasics">▸</span>
          </button>
          <div id="panelSixSigmaBasics" class="panel hidden">
            <ul>
              <li>At “six sigma” performance, defects are extremely rare: about <strong>3.4 defects per million opportunities</strong> (DPMO).</li>
              <li>Many real processes operate at ~3–4 sigma; improvement often brings large gains.</li>
              <li>Six Sigma emphasizes: measurement, analysis, disciplined improvement, and control.</li>
            </ul>
          </div>

          <hr>

          <p>
            Next, we visualize sigma levels and why improvement is not linear.
          </p>
        </div>
      `
    },

    {
      type:"content",
      title:"Sigma levels: visualization + reference table",
      html: `
        <div class="book">
          <p class="lead dropcap">
            Sigma levels describe how far defects sit from the “normal” center of process performance.
            As sigma increases, defects drop dramatically—improvement becomes exponential.
          </p>

          <div class="panel" style="margin-top:14px">
            <svg viewBox="0 0 920 260" width="100%" role="img" aria-label="Bell curve with sigma markers">

                       C160 220, 190 70, 320 70
                       C410 70, 430 40, 465 40
                       C500 40, 520 70, 610 70
                       C740 70, 770 220, 870 220"
                    fill="rgba(77,163,255,.10)" stroke="rgba(77,163,255,.75)" stroke-width="3"/>

              <line x1="465" y1="220" x2="465" y2="40" stroke="rgba(61,220,151,.65)" stroke-width="3"/>

              <g stroke="rgba(255,255,255,.25)" stroke-width="2">
                <line x1="365" y1="220" x2="365" y2="110"/>
                <line x1="565" y1="220" x2="565" y2="110"/>
                <line x1="265" y1="220" x2="265" y2="150"/>
                <line x1="665" y1="220" x2="665" y2="150"/>
                <line x1="165" y1="220" x2="165" y2="190"/>
                <line x1="765" y1="220" x2="765" y2="190"/>
              </g>

              <g fill="#e7eefc" font-size="14">
                <text x="454" y="236">μ</text>
                <text x="350" y="105">-1σ</text>
                <text x="550" y="105">+1σ</text>
                <text x="250" y="145">-2σ</text>
                <text x="650" y="145">+2σ</text>
                <text x="150" y="185">-3σ</text>
                <text x="750" y="185">+3σ</text>
              </g>
            </svg>

            <div class="small" style="margin-top:10px">
              Visual intuition: as you push defects further into the tails (higher sigma), the defect rate collapses.
            </div>
          </div>

          <div class="panel" style="margin-top:14px">
            <div class="h2" style="margin-top:0">Sigma reference (DPMO)</div>
            <div style="overflow:auto">
              <table style="width:100%; border-collapse:collapse; font-size:14px">
                <thead>
                  <tr>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid rgba(255,255,255,.12)">Sigma Level</th>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid rgba(255,255,255,.12)">DPMO</th>
                    <th style="text-align:left; padding:10px; border-bottom:1px solid rgba(255,255,255,.12)">Percent Good</th>
                  </tr>
                </thead>
                <tbody>
                  <tr><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">1</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">690,000</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">31.000%</td></tr>
                  <tr><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">2</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">308,537</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">69.1463%</td></tr>
                  <tr><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">3</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">66,807</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">93.3193%</td></tr>
                  <tr><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">4</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">6,210</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">99.379%</td></tr>
                  <tr><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">5</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">233</td><td style="padding:10px; border-bottom:1px solid rgba(255,255,255,.08)">99.9767%</td></tr>
                  <tr><td style="padding:10px;">6</td><td style="padding:10px;">3.4</td><td style="padding:10px;">99.99966%</td></tr>

            </div>
          </div>

          <p class="small">
            Practical point: the “right sigma” depends on context. Some processes cannot afford defects; others prioritize flexibility.
          </p>
        </div>
      `

    {

function wireToggle(btnId, panelId, iconId, key){
  const btn = document.getElementById(btnId);
  const panel = document.getElementById(panelId);
  const icon = document.getElementById(iconId);
  if(!btn || !panel || !icon) return;

  const on = !!state.expanded[key];
  panel.classList.toggle("hidden", !on);
  icon.textContent = on ? "▾" : "▸";

  btn.onclick = () => {
    const now = !state.expanded[key];
    state.expanded[key] = now;
    panel.classList.toggle("hidden", !now);
    icon.textContent = now ? "▾" : "▸";
    saveState();
  };
}

function renderQuiz(sl){
  const prev = state.quiz[sl.qid];
  const chosen = (prev && typeof prev.selectedIndex === "number") ? prev.selectedIndex : null;
  const answered = !!prev;

  const optsHtml = sl.options.map((txt, i) => {
    let cls = "";
    if(answered){
      if(i === sl.correctIndex) cls = "correct";
      else if(i === chosen) cls = "wrong";
    }
    return `<button class="qOpt ${cls}" data-i="${i}" type="button">${txt}</button>`;
  }).join("");

  const fb = answered
    ? `<div class="qFeedback">${prev.isCorrect ? "✅ Correct. " : "❌ Not quite. "}${sl.explanation}</div>`
    : `<div class="qFeedback hidden"></div>`;

  return `
    <div class="quizBox">
      <div class="qTitle">${sl.title}</div>
      <p class="qPrompt">${sl.question}</p>
      <div class="qOptions">${optsHtml}</div>
      ${fb}
      <div class="qMeta">You can retry. Export stores your latest attempt.</div>
    </div>
  `;
}

function wireQuiz(sl){
  const box = document.querySelector(".quizBox");
  if(!box) return;
  box.querySelectorAll(".qOpt").forEach(btn => {

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}



function buildDraggableList(container, items){
  container.innerHTML = "";
  for(const t of items){
    const el = document.createElement("div");
    el.className = "dragItem";
    el.textContent = t;
    container.appendChild(el);
  }
  enableDragSort(container);
}


function getCurrentOrder(container){

/** ---------------------------------------------------------
 *  Drag-sort (Pointer Events) — robust single-instance manager
 *  Same behavior as our Lecture 1 implementation:
 *  - keep original in DOM (hidden)
 *  - drag a floating ghost clone
 *  - reorder based on closest mid-point
 *  --------------------------------------------------------- */
(function(){
  if (window.__DragSortManager) return;

  const M = {
    active: null,   // { container, original, ghost, offsetY }
    bound: false,
  };

  function listItems(container){ return [...container.querySelectorAll(".dragItem")]; }

  function cleanup(){
    const a = M.active;
    if(!a) return;
    a.original.style.visibility = "";
    if(a.ghost){ a.ghost.remove(); }
    M.active = null;
  }

  function moveGhost(clientY){
    const a = M.active;
    if(!a || !a.ghost) return;

    a.ghost.style.top = (clientY - a.offsetY) + "px";

    const ghostRect = a.ghost.getBoundingClientRect();
    const ghostMidY = ghostRect.top + ghostRect.height / 2;

    let best = null;
    let bestDist = Infinity;

    for(const el of listItems(a.container)){
      if(el === a.original) continue;
      const r = el.getBoundingClientRect();
      const mid = r.top + r.height / 2;
      const d = Math.abs(mid - ghostMidY);
      if(d < bestDist){
        bestDist = d;
        best = { el, mid };
      }
    }

    if(best){
      const insertAfter = ghostMidY > best.mid;
      if(insertAfter){
        if(best.el.nextSibling !== a.original){
          a.container.insertBefore(a.original, best.el.nextSibling);
        }
      } else {
        if(best.el !== a.original.nextSibling){
          a.container.insertBefore(a.original, best.el);
        }
      }
    }
  }

  function onPointerMove(e){
    if(!M.active) return;
    e.preventDefault();
    moveGhost(e.clientY);
  }

  function onPointerUp(e){
    if(!M.active) return;
    e.preventDefault();
    cleanup();
  }

  M.bindGlobal = function(){
    if(M.bound) return;
    M.bound = true;
    window.addEventListener("pointermove", onPointerMove, { passive:false });
    window.addEventListener("pointerup", onPointerUp, { passive:false });
    window.addEventListener("pointercancel", onPointerUp, { passive:false });
  };

  window.__DragSortManager = M;

  window.enableDragSort = function enableDragSort(container){
    if (!container || container.dataset.dragSortBound === "1") return;
    container.dataset.dragSortBound = "1";

    container.style.touchAction = "none";
    M.bindGlobal();

    container.addEventListener("pointerdown", (e) => {
      const target = e.target.closest(".dragItem");
      if(!target) return;

      e.preventDefault();

      const original = target;
      const rect = original.getBoundingClientRect();
      const offsetY = e.clientY - rect.top;

      const ghost = original.cloneNode(true);
      ghost.classList.add("dragGhost");
      ghost.style.left = rect.left + "px";
      ghost.style.top  = rect.top + "px";
      ghost.style.width = rect.width + "px";
      document.body.appendChild(ghost);

      original.style.visibility = "hidden";

      M.active = { container, original, ghost, offsetY };
      moveGhost(e.clientY);
    });
  };
})();



function initDMAIC(){
  const pool = document.getElementById("dmaic-pool");
  const drop = document.getElementById("dmaic-drop");
  const fb   = document.getElementById("dmaic-feedback");
  const btnCheck = document.getElementById("dmaicCheck");
  const btnReset = document.getElementById("dmaicReset");
  if(!pool || !drop || !fb || !btnCheck || !btnReset) return;

  const correct = ["Define","Measure","Analyze","Improve","Control"];

  function makeItem(label){
    const el = document.createElement("div");
    el.className = "orderItem";
    el.dataset.label = label;
    el.textContent = label;
    return el;
  }

  function enableDrop(zone){
    zone.addEventListener("dragover", (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
    zone.addEventListener("drop", (e) => {
      e.preventDefault();
      const label = e.dataTransfer.getData("text/plain");
      if(!label) return;
      const el = document.querySelector(`.orderItem[data-label="${label.replace(/"/g,'\\"')}"]`);
      if(el) zone.appendChild(el);
      // clear feedback + hints on move
      fb.textContent = "";
      drop.querySelectorAll(".orderItem").forEach(x => x.classList.remove("orderHintGood","orderHintBad"));
      saveDMAIC();
    });
  }

  function saveDMAIC(){
    state.activity = state.activity || {};
    state.activity.dmaic = {
      pool: Array.from(pool.querySelectorAll(".orderItem")).map(x => x.dataset.label),
      drop: Array.from(drop.querySelectorAll(".orderItem")).map(x => x.dataset.label),
    };
    saveState();
  }

  function loadDMAIC(){
    const saved = state.activity && state.activity.dmaic;
    pool.innerHTML = ""; drop.innerHTML = "";
    const labels = (saved && Array.isArray(saved.pool) && Array.isArray(saved.drop))
      ? {pool: saved.pool, drop: saved.drop}
      : {pool: shuffleArray(correct), drop: []};

    labels.pool.forEach(l => pool.appendChild(makeItem(l)));
    labels.drop.forEach(l => drop.appendChild(makeItem(l)));
    fb.textContent = "";
  }

  enableDrop(pool);
  enableDrop(drop);

  // Mobile-friendly pointer DnD (move + reorder)
  buildDraggableList(pool, drop, fb, saveDMAIC);


  btnReset.onclick = () => {
    state.activity = state.activity || {};
    state.activity.dmaic = { pool: shuffleArray(correct), drop: [] };
    saveState();
    loadDMAIC();
  };

  btnCheck.onclick = () => {
    const order = Array.from(drop.querySelectorAll(".orderItem")).map(x => x.dataset.label);
    // clear hints
    drop.querySelectorAll(".orderItem").forEach(x => x.classList.remove("orderHintGood","orderHintBad"));

    if(order.length !== correct.length){
      fb.textContent = `Not finished yet: you placed ${order.length} of ${correct.length} cards.`;
      return;
    }

    let ok = true;
    order.forEach((v,i) => {
      const el = drop.querySelectorAll(".orderItem")[i];
      if(v === correct[i]) el.classList.add("orderHintGood");
      else { el.classList.add("orderHintBad"); ok = false; }
    });

    fb.textContent = ok
      ? "✅ Correct order. DMAIC keeps improvement disciplined and sustainable."
      : "❌ Not yet. Hint: Define is first; Control is last.";
    saveDMAIC();
  };

  loadDMAIC();
}

function init5S(){

  const btnCheck = document.getElementById("s5Check");

  if(!board || !fb || !btnCheck || !btnReset) return;

  const correct = [
    "Sort (Seiri): remove needless clutter and processes",
    "Straighten (Seiton): organize for efficient access and action",
    "Shine (Seiso): keep clean daily; look for causes of dirtiness",
    "Standardize (Seiketsu): define steps, roles, responsibilities",
    "Sustain (Shitsuke): maintain standards over time"
  ];
  const start = (state.activity.s5Order && Array.isArray(state.activity.s5Order)) ? state.activity.s5Order : shuffleArray(correct);
  buildDraggableList(board, start);

  btnReset.onclick = () => {
    const shuffled = shuffleArray(correct);
    state.activity.s5Order = shuffled;
    saveState();
    buildDraggableList(board, shuffled);
    fb.classList.add("hidden");
    fb.textContent = "";
  };

  btnCheck.onclick = () => {
    const order = getCurrentOrder(board);
    state.activity.s5Order = order;
    saveState();
    const ok = order.join("|") === correct.join("|");
    fb.classList.remove("hidden");
    fb.textContent = ok ? "✅ Correct. 5S builds discipline, making later improvement (including automation) easier."
                        : "❌ Not yet. Hint: Sort → Straighten → Shine → Standardize → Sustain.";
  };
}

function render(){
  document.getElementById("courseTitle").textContent = lessonData.courseTitle;
  document.getElementById("courseSub").textContent = lessonData.courseSub;

  const goals = document.getElementById("goals");
  goals.innerHTML = "";
  lessonData.learningOutcomes.forEach((g) => {
    const li = document.createElement("li");
    li.textContent = g;
    goals.appendChild(li);
  });

  const total = lessonData.slides.length;
  state.idx = Math.max(0, Math.min(state.idx, total - 1));
  document.getElementById("slideCounter").textContent = `${state.idx + 1} / ${total}`;
  document.getElementById("progressFill").style.width = `${((state.idx + 1)/total)*100}%`;

  const sl = lessonData.slides[state.idx];
  const slideEl = document.getElementById("slide");

  if(sl.type === "quiz"){
    slideEl.innerHTML = renderQuiz(sl);
  } else {
    slideEl.innerHTML = `<div class="h1">${sl.title}</div>${sl.html}`;
  }

  document.getElementById("statusLine").textContent = (sl.type === "quiz") ? "Quick Check (retry allowed)" : "Reading slide";

  wireToggle("toggleVoya","panelVoya","iconVoya","voya");
  wireToggle("toggleVoyaOutcomes","panelVoyaOutcomes","iconVoyaOutcomes","voyaOutcomes");
  wireToggle("toggleToyota","panelToyota","iconToyota","toyota");
  wireToggle("toggleLeanPrinciples","panelLeanPrinciples","iconLeanPrinciples","leanPrinciples");
  wireToggle("toggleDanaher","panelDanaher","iconDanaher","danaher");
  wireToggle("toggleSixSigmaBasics","panelSixSigmaBasics","iconSixSigmaBasics","sixSigmaBasics");
  wireToggle("toggleDMAIC","panelDMAIC","iconDMAIC","dmaic");
  wireToggle("toggleRoles","panelRoles","iconRoles","roles");
  wireToggle("toggleBelts","panelBelts","iconBelts","belts");
  wireToggle("toggleWastes","panelWastes","iconWastes","wastes");
  wireToggle("toggleKraftHeinz","panelKraftHeinz","iconKraftHeinz","kraftHeinz");

  initDMAIC();
  init5S();

  if(sl.type === "quiz") wireQuiz(sl);

  document.getElementById("btnPrev").disabled = (state.idx === 0);
  document.getElementById("btnNext").disabled = (state.idx === total - 1);

  saveState();
}

document.getElementById("btnPrev").addEventListener("click", () => { state.idx = Math.max(0, state.idx - 1); render(); });
document.getElementById("btnNext").addEventListener("click", () => { state.idx = Math.min(lessonData.slides.length - 1, state.idx + 1); render(); });

document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowLeft"){ state.idx = Math.max(0, state.idx - 1); render(); }
  else if(e.key === "ArrowRight"){ state.idx = Math.min(lessonData.slides.length - 1, state.idx + 1); render(); }
});

document.getElementById("btnExport").addEventListener("click", () => {
  const payload = { courseTitle: lessonData.courseTitle, exportedAt: new Date().toISOString(), state };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "lecture3_progress.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

document.getElementById("btnReset").addEventListener("click", () => {
  if(confirm("Reset your progress for Lecture 3?")) resetState();
});

render();
</script>
</body>
</html>
