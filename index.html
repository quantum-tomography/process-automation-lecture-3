<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Process Automation – Lecture 2</title>

  <style>
    :root { --bg:#0b1220; --card:#111a2e; --text:#e7eefc; --muted:#a8b3cf; --accent:#4da3ff; --good:#3ddc97; --bad:#ff5c7a; }
    *{ box-sizing:border-box; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body{ margin:0; background:linear-gradient(160deg,#081022,#0b1220); color:var(--text); }
    header{ position:sticky; top:0; backdrop-filter: blur(10px); background:rgba(11,18,32,.7); border-bottom:1px solid rgba(255,255,255,.08); z-index:10; }
    .wrap{ max-width:1000px; margin:0 auto; padding:18px 18px; }
    .row{ display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .title{ font-weight:700; letter-spacing:.2px; }
    .sub{ color:var(--muted); font-size:14px; }
    .bar{ height:10px; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; }
    .bar > div{ height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#7cc6ff); transition:width .25s ease; }
    main{ padding:20px 0 60px; }
    .card{ background:rgba(17,26,46,.85); border:1px solid rgba(255,255,255,.08); border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
    .cardPad{ padding:18px; }

    .grid{ display:grid; grid-template-columns: 1fr; gap:14px; }
    @media(min-width: 900px){ .grid{ grid-template-columns: 2fr 1fr; } }

    .h1{ font-size:26px; margin:0 0 10px; }
    .h2{ font-size:18px; margin:18px 0 10px; color:#d8e6ff; }

    ul{ margin:10px 0 0 18px; color:var(--text); }
    li{ margin:6px 0; }

    .pill{ display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(77,163,255,.12); border:1px solid rgba(77,163,255,.35); color:#cfe7ff; font-size:12px; }

    .btns{ display:flex; gap:10px; flex-wrap:wrap; }
    button{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      transition:transform .04s ease, background .15s ease;
    }
    button:hover{ background:rgba(255,255,255,.10); }
    button:active{ transform:translateY(1px); }
    button.primary{ background:rgba(77,163,255,.20); border-color:rgba(77,163,255,.55); }
    button.primary:hover{ background:rgba(77,163,255,.28); }
    button.bad{ background:rgba(255,92,122,.16); border-color:rgba(255,92,122,.45); }

    .note{ color:var(--muted); font-size:14px; line-height:1.6; }
    .kbd{ font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; padding:2px 6px; border-radius:8px; border:1px solid rgba(255,255,255,.15); background:rgba(0,0,0,.18); }

    .footerNav{ position:fixed; bottom:0; left:0; right:0; background:rgba(11,18,32,.75); border-top:1px solid rgba(255,255,255,.08); backdrop-filter: blur(10px); }
    .footerNav .wrap{ display:flex; justify-content:space-between; align-items:center; gap:12px; }

    /* ---- Book-like typography ---- */
    .book{ max-width: 70ch; margin: 0; }
    .book p{ color: var(--text); line-height: 1.85; margin: 10px 0; font-size: 16px; }
    .book p.lead{ color: #d8e6ff; font-size: 16px; }
    .book .small{ color: var(--muted); font-size: 13px; margin-top: 6px; }
    .book hr{ border: none; border-top: 1px solid rgba(255,255,255,.10); margin: 18px 0; }
    .book .dropcap:first-letter{
      float:left; font-size: 42px; line-height: 38px; padding: 6px 8px 0 0;
      color: #d8e6ff; font-weight: 800;
    }

    .quote{
      margin:12px 0;
      padding:12px 14px;
      border-left:4px solid rgba(77,163,255,.75);
      background:rgba(77,163,255,.08);
      border-radius:14px;
      color:#d9ecff;
      white-space: pre-wrap;
    }

    /* Reveal blocks */
    .toggleBtn{
      display:flex; align-items:center; justify-content:space-between;
      width:100%; text-align:left; margin-top:14px; padding:10px 12px;
      border-radius:14px; border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04); cursor:pointer; color:#d8e6ff; font-weight:700;
    }
    .toggleBtn:hover{ background:rgba(255,255,255,.07); }
    .panel{
      margin-top:10px; padding:12px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.03);
    }
    .hidden{ display:none; }

    .kpiGrid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:10px; margin-top:10px; }
    .kpi{ border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.04); border-radius:14px; padding:12px; }
    .kpi strong{ display:block; font-size:13px; color:#d8e6ff; }
    .kpi span{ display:block; margin-top:6px; color:var(--text); }

    .marker{
      display:inline-block; padding:2px 8px; border-radius:999px;
      border:1px solid rgba(77,163,255,.35); background:rgba(77,163,255,.10);
      color:#cfe7ff; font-size:12px; transform: translateY(-1px);
    }

    /* ---- Quiz styles (retry-friendly) ---- */
    .quizBox{
      margin-top:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      border-radius:16px;
      padding:14px;
    }
    .qTitle{ font-weight:800; color:#d8e6ff; margin:0 0 8px; }
    .qPrompt{ margin:0 0 12px; line-height:1.75; color:var(--text); }
    .qOptions{ display:grid; gap:10px; }
    .qOpt{
      text-align:left;
      border-radius:14px;
      padding:12px 12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
    }
    .qOpt:hover{ background:rgba(255,255,255,.08); }
    .qOpt.correct{
      border-color:rgba(61,220,151,.55);
      background:rgba(61,220,151,.12);
    }
    .qOpt.wrong{
      border-color:rgba(255,92,122,.55);
      background:rgba(255,92,122,.12);
    }
    .qFeedback{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      color:var(--text);
      line-height:1.6;
    }
    .qMeta{ margin-top:10px; color:var(--muted); font-size:13px; }
  
    /* ---- Ordering activities (DMAIC, 5S) ---- */
    .orderPool, .orderDrop{
      display:flex; flex-wrap:wrap; gap:10px;
      padding:10px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.18);
      background:rgba(255,255,255,.03);
      min-height:54px;
    }
    .orderItem{
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      cursor:grab;
      user-select:none;
      font-weight:700;
      color:var(--text);
    }
    .orderItem:active{ cursor:grabbing; }
    .orderDrop .orderItem{
      border-color:rgba(77,163,255,.30);
      background:rgba(77,163,255,.08);
    }
    .orderHintGood{ border-color:rgba(61,220,151,.45) !important; background:rgba(61,220,151,.10) !important; }
    .orderHintBad{ border-color:rgba(255,92,122,.45) !important; background:rgba(255,92,122,.10) !important; }

  </style>
</head>

    {

        <div class="book">
          <p class="lead dropcap">
            Lean thinking grew out of manufacturing. Henry Ford’s moving assembly line (1913) showed how standardization

          </p>

          <p>
            But mass production has a weakness: it can become rigid—treating people like parts of a machine.
            After the 1970s–1980s competition wave, companies had to rethink production.
          </p>

          <p>
            Toyota became the most famous example. After studying Ford’s approach, Toyota realized Japan needed
            smaller batches and more variety. The result was a production philosophy that aimed for
            <strong>low cost</strong>, <strong>high quality</strong>, and <strong>mass customization</strong>.
          </p>

          <hr>

          <p class="small">

          </p>

      `

    {

      html: `
        <div class="book">
          <p class="lead dropcap">
            Lean can look “fuzzy” because organizations adapt it. But the foundation is surprisingly simple:
            identify what creates value, then remove what does not.
          </p>

          <button class="toggleBtn" id="toggleLeanPrinciples" type="button">
            <span>Reveal: The five principles</span>
            <span id="iconLeanPrinciples">▸</span>
          </button>
          <div id="panelLeanPrinciples" class="panel hidden">

              <li><strong>Value:</strong> what the customer will actually pay for.</li>
              <li><strong>Value Stream:</strong> map the flow end-to-end; remove waste (but keep necessary compliance/safety steps).</li>
              <li><strong>Flow:</strong> make creation and delivery smooth—optimize small steps across departments.</li>
              <li><strong>Pull:</strong> produce when needed (just-in-time) to avoid inventory waste.</li>
              <li><strong>Perfection:</strong> continuous improvement (<em>kaizen</em>) as a daily habit.</li>
            </ul>
          </div>

          <hr>

          <p>

          </p>
        </div>
      `

            After early operational trouble, Toyota production experts pushed a deep redesign of workflows.
          </p>

          <p>
            The learnings became the <strong>Danaher Business System (DBS)</strong>—a repeatable way to run improvement cycles.

            <ul>
              <li><strong>Kaizen sessions:</strong> structured improvement workshops.</li>
              <li><strong>Policy deployment reviews:</strong> deep goal progress reviews across divisions.</li>
              <li><strong>Leadership involvement:</strong> executives actively teach and reinforce the method.</li>
            </ul>
          </div>

          <hr>

          <p class="small">
            Lesson: “lean” works best when it is embedded into management rhythms, not treated as a temporary project.
          </p>
        </div>
      `
    },

    {
      type:"content",
      title:"Six Sigma: quality improvement with statistics",
      html: `
        <div class="book">
          <p class="lead dropcap">
            Six Sigma is a disciplined approach to reducing defects by measuring variation, finding root causes,
            and improving processes in a repeatable, data-based way.
          </p>

          <p>
            The “sigma” idea comes from statistics: a standard deviation measures how spread out data is.
            In a normal (bell) curve, most outcomes cluster around the mean.
          </p>

          <button class="toggleBtn" id="toggleSixSigmaMeaning" type="button">

          </button>

            <p class="note" style="margin-top:0">

            </p>
            <p class="small">
              Real organizations often operate around 3–4 sigma. Six Sigma tools aim to push quality upward.

function render(){
  document.getElementById("courseTitle").textContent = lessonData.courseTitle;
  document.getElementById("courseSub").textContent = lessonData.courseSub;

  const goalsEl = document.getElementById("goals");
  goalsEl.innerHTML = "";
  for(const g of lessonData.learningOutcomes){
    const li = document.createElement("li");
    li.textContent = g;
    goalsEl.appendChild(li);
  }

  const slides = lessonData.slides;
  state.idx = Math.max(0, Math.min(state.idx, slides.length - 1));

  document.getElementById("slideCounter").textContent = `${state.idx + 1} / ${slides.length}`;
  document.getElementById("progressFill").style.width = `${((state.idx + 1) / slides.length) * 100}%`;

  document.getElementById("btnPrev").disabled = (state.idx === 0);
  document.getElementById("btnNext").disabled = (state.idx === slides.length - 1);

  const slide = slides[state.idx];
  const slideEl = document.getElementById("slide");
  slideEl.innerHTML = "";

  const h = document.createElement("h1");
  h.className = "h1";
  h.textContent = slide.title;
  slideEl.appendChild(h);

  if(slide.type === "quiz"){
    slideEl.appendChild(renderQuiz(slide));
  } else {
    const content = document.createElement("div");
    content.innerHTML = slide.html;
    slideEl.appendChild(content);
    bindRevealsForSlide(state.idx);
  }

  const openCount = Object.values(state.expanded).filter(Boolean).length;
  const quizSlides = lessonData.slides.filter(s => s.type === "quiz").length;
  const quizAnswered = Object.keys(state.quiz || {}).length;
  document.getElementById("statusLine").textContent =
    `Slide ${state.idx + 1}/${slides.length} • Revealed blocks: ${openCount} • Quick checks (latest tries): ${quizAnswered}/${quizSlides}`;

  saveState();
}

  } else if(idx === 40){
    initOrder("dmaic");
  } else if(idx === 41){
    bindReveal("toggleRolesBelts","panelRolesBelts","iconRolesBelts","rolesBelts");
  } else if(idx === 43){
    bindReveal("toggleFiveS","panelFiveS","iconFiveS","fiveS");
  } else if(idx === 44){
    initOrder("s5");
  } else if(idx === 45){
    bindReveal("toggleSevenWastes","panelSevenWastes","iconSevenWastes","sevenWastes");
  } else if(idx === 46){
    bindReveal("toggleBalance","panelBalance","iconBalance","balance");
  } else if(idx === 47){
    bindReveal("toggleApplyRpa","panelApplyRpa","iconApplyRpa","applyRpa");
  }


}

function bindReveal(btnId, panelId, iconId, key){
  const btn = document.getElementById(btnId);
  const panel = document.getElementById(panelId);
  const icon = document.getElementById(iconId);
  if(!btn || !panel || !icon) return;

  const isOpen = !!state.expanded[key];
  panel.classList.toggle("hidden", !isOpen);
  icon.textContent = isOpen ? "▾" : "▸";

  btn.addEventListener("click", () => {
    state.expanded[key] = !state.expanded[key];
    saveState();
    render();
  });
}


/** ---------------------------------------------------------
 *  Ordering activities (DMAIC / 5S)
 *  - Drag cards between pool and drop zone
 *  - Check compares the drop order to the correct sequence
 *  --------------------------------------------------------- */
const orderBank = {
  dmaic: {
    items: ["Define","Measure","Analyze","Improve","Control"],
    correct: ["Define","Measure","Analyze","Improve","Control"]
  },
  s5: {
    items: ["Sort","Straighten","Shine","Standardize","Sustain"],
    correct: ["Sort","Straighten","Shine","Standardize","Sustain"]
  }
};

function initOrder(id){
  const pool = document.querySelector(`[data-order-id="${id}"]#${id}-pool`) || document.getElementById(`${id}-pool`);
  const drop = document.querySelector(`[data-order-id="${id}"]#${id}-drop`) || document.getElementById(`${id}-drop`);
  if(!pool || !drop) return;

  // If already initialized with children, skip.
  if(pool.dataset.inited === "1" || drop.dataset.inited === "1") return;

  pool.dataset.inited = "1";
  drop.dataset.inited = "1";

  const cfg = orderBank[id];
  if(!cfg) return;

  // shuffle
  const items = [...cfg.items].sort(() => Math.random() - 0.5);

  pool.innerHTML = "";
  drop.innerHTML = "";

  for(const label of items){
    const el = document.createElement("div");
    el.className = "orderItem";
    el.textContent = label;
    el.draggable = true;
    el.dataset.orderLabel = label;

    el.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/plain", label);
      e.dataTransfer.effectAllowed = "move";
    });

    pool.appendChild(el);
  }

  const allowDrop = (zone) => {
    zone.addEventListener("dragover", (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
    zone.addEventListener("drop", (e) => {
      e.preventDefault();
      const label = e.dataTransfer.getData("text/plain");
      if(!label) return;
      // Move the first matching element from either zone into the target zone
      const el = document.querySelector(`.orderItem[data-order-label="${cssEscape(label)}"]`);
      if(el) zone.appendChild(el);
    });
  };
  allowDrop(pool);
  allowDrop(drop);

  const fb = document.getElementById(`${id}-feedback`);
  if(fb) fb.textContent = "";
}

function cssEscape(s){
  // minimal escape for attribute selector
  return String(s).replace(/"/g, '\"');
}

function resetOrder(id){
  const pool = document.getElementById(`${id}-pool`);
  const drop = document.getElementById(`${id}-drop`);
  if(pool) pool.dataset.inited = "0";
  if(drop) drop.dataset.inited = "0";
  initOrder(id);
}

function checkOrder(id){
  const cfg = orderBank[id];
  const drop = document.getElementById(`${id}-drop`);
  const fb = document.getElementById(`${id}-feedback`);
  if(!cfg || !drop || !fb) return;

  const picked = [...drop.querySelectorAll(".orderItem")].map(x => x.dataset.orderLabel || x.textContent.trim());
  const correct = cfg.correct;

  // Clear hints
  [...drop.querySelectorAll(".orderItem")].forEach(el => { el.classList.remove("orderHintGood","orderHintBad"); });

  if(picked.length !== correct.length){
    fb.innerHTML = `Not finished yet: you placed <strong>${picked.length}</strong> of <strong>${correct.length}</strong> cards.`;
    return;
  }

  let ok = true;
  picked.forEach((v, i) => {
    const el = drop.querySelectorAll(".orderItem")[i];
    if(v === correct[i]) el.classList.add("orderHintGood");
    else { el.classList.add("orderHintBad"); ok = false; }
  });

  fb.innerHTML = ok
    ? `✅ <strong>Correct.</strong> You placed the steps in the right order.`
    : `❌ <strong>Not quite.</strong> Fix the red cards and try again.`;
}


/** ---------------------------------------------------------
 *  Retry-friendly quiz renderer:
 *  - ALWAYS clickable (no lock)
 *  - Store ONLY last selection per qid
 *  - Show feedback immediately
 *  --------------------------------------------------------- */
function renderQuiz(slide){
  const wrap = document.createElement("div");
  wrap.className = "book";

  const box = document.createElement("div");
  box.className = "quizBox";

  const goal = lessonData.learningOutcomes[slide.goalIndex] || "Learning goal";
  const t = document.createElement("div");
  t.className = "qTitle";
  t.textContent = `Quick Check • Goal: ${goal}`;
  box.appendChild(t);

  const p = document.createElement("p");
  p.className = "qPrompt";
  p.textContent = slide.question;
  box.appendChild(p);

  const opts = document.createElement("div");
  opts.className = "qOptions";

  const saved = state.quiz?.[slide.qid] || null;

  slide.options.forEach((txt, i) => {
    const b = document.createElement("button");
    b.className = "qOpt";
    b.type = "button";
    b.textContent = `${String.fromCharCode(65 + i)}. ${txt}`;

    if(saved){
      if(i === slide.correctIndex) b.classList.add("correct");
      if(i === saved.selectedIndex && !saved.isCorrect) b.classList.add("wrong");
    }

    b.addEventListener("click", () => {
      const isCorrect = (i === slide.correctIndex);
      state.quiz = state.quiz || {};
      state.quiz[slide.qid] = {
        selectedIndex: i,
        isCorrect,
        answeredAt: new Date().toISOString()
      };
      saveState();
      render();
    });

    opts.appendChild(b);
  });

  box.appendChild(opts);

  const fb = document.createElement("div");
  fb.className = "qFeedback";
  if(!saved){
    fb.innerHTML = `<strong>Pick one option.</strong> You can try as many times as you like; only your <em>latest</em> try is stored for export.`;
  } else {
    fb.innerHTML = saved.isCorrect
      ? `✅ <strong>Correct.</strong> ${slide.explanation}`
      : `❌ <strong>Not quite.</strong> ${slide.explanation}`;
  }
  box.appendChild(fb);

  const meta = document.createElement("div");
  meta.className = "qMeta";
  meta.textContent = saved
    ? `Last try: ${new Date(saved.answeredAt).toLocaleString()}`
    : "No attempts yet.";
  box.appendChild(meta);

  wrap.appendChild(box);
  return wrap;
}

// Navigation
function nextSlide(){ if(state.idx < lessonData.slides.length - 1){ state.idx++; render(); } }
function prevSlide(){ if(state.idx > 0){ state.idx--; render(); } }

document.getElementById("btnNext").addEventListener("click", nextSlide);
document.getElementById("btnPrev").addEventListener("click", prevSlide);

// Actions
document.getElementById("btnReset").addEventListener("click", resetState);
document.getElementById("btnExport").addEventListener("click", () => {
  const exportObj = {
    course: lessonData.courseTitle,
    startedAt: state.startedAt,
    currentSlide: state.idx + 1,
    expanded: state.expanded,
    quiz_last_tries: state.quiz,
    learningOutcomes: lessonData.learningOutcomes
  };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "lecture2_progress.json";
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById("statusLine").textContent = "Exported progress JSON (latest quiz tries).";
});

// Hotkeys
document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowRight") nextSlide();
  if(e.key === "ArrowLeft") prevSlide();
});

render();
</script>
